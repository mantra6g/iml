---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [
            {
              "name": "iml-cni", 
              "cni-args": {
                "app_type": "application_function",
                "app_id": "face-feed"
              }
            }
          ]
    spec:
      nodeSelector:
        kubernetes.io/hostname: oai-01
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
