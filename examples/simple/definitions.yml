apiVersion: cache.desire6g.eu/v1alpha1
kind: Application
metadata:
  name: web-client
  namespace: default
spec: 
  override_id: dead-beef
---
apiVersion: cache.desire6g.eu/v1alpha1
kind: Application
metadata:
  name: web-server
  namespace: default
spec: 
  override_id: face-feed
---
apiVersion: cache.desire6g.eu/v1alpha1
kind: NetworkFunction
metadata:
  name: pkt-logger
  namespace: default
spec: 
  image: tomasagata/pkt-logger:latest
  replicas: 1
---
apiVersion: cache.desire6g.eu/v1alpha1
kind: ServiceChain
metadata:
  name: client-server-with-logger
  namespace: default
spec:
  from:
    name: web-client
    namespace: default
  to:
    name: web-server
    namespace: default
  functions:
  - name: pkt-logger
    namespace: default