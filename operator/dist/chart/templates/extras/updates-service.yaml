apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "loom-operator.name" . }}-operator
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: controller-manager
  name: {{ include "loom-operator.resourceName" (dict "suffix" "updates-service" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: http
    port: 1810
    protocol: TCP
    targetPort: 3267
  - name: mqtt
    port: 1816
    protocol: TCP
    targetPort: 1883
  selector:
    app.kubernetes.io/name: {{ include "loom-operator.name" . }}-operator
    control-plane: controller-manager
