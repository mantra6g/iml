{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "loom-operator.name" . }}-operator
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "loom-operator.resourceName" (dict "suffix" "core-application-admin-role" "context" $) }}
rules:
- apiGroups:
  - core.loom.io
  resources:
  - applications
  verbs:
  - '*'
- apiGroups:
  - core.loom.io
  resources:
  - applications/status
  verbs:
  - get
{{- end }}
