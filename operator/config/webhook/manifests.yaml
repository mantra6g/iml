---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-scheduling-loom-io-v1alpha1-networkfunctiondeployment
  failurePolicy: Fail
  name: mnetworkfunctiondeployment-v1alpha1.kb.io
  rules:
  - apiGroups:
    - scheduling.loom.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - networkfunctiondeployments
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-scheduling-loom-io-v1alpha1-networkfunctiondeployment
  failurePolicy: Fail
  name: vnetworkfunctiondeployment-v1alpha1.kb.io
  rules:
  - apiGroups:
    - scheduling.loom.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - networkfunctiondeployments
  sideEffects: None
