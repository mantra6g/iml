# Enable/disable subcharts
operator:
  enabled: true

daemon:
  enabled: true

cni:
  enabled: true

# Placeholder values for cni
cniValues:
  # nameOverride: ""
  # fullnameOverride: ""
  cniVersion: "0.4.0"
  type: imlcni

# Placeholder values for daemon
daemonValues:
  # nameOverride: ""
  # fullnameOverride: ""
  image:
    repository: tomasagata/iml-daemon
    tag: "0.0.1"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1000m
      memory: 2048Mi
    requests:
      cpu: 500m
      memory: 1024Mi
  cniInstaller:
    containerName: iml-cni-installer
    image: tomasagata/iml-cni
    tag: "0.0.1"
  cniConfig:
    cniVersion: "0.4.0"
    type: imlcni

# Values to pass to operator chart (keeps its original structure)
operatorValues:
  # nameOverride: ""
  # fullnameOverride: ""
  manager:
    replicas: 1

    image:
      repository: tomasagata/loom-operator
      tag: latest
      pullPolicy: IfNotPresent

    ## Arguments
    ##
    args:
      - --leader-elect

    ## Environment variables
    ##
    env: [ ]

    ## Env overrides (--set manager.envOverrides.VAR=value)
    ## Same name in env above: this value takes precedence.
    ##
    envOverrides: { }

    ## Image pull secrets
    ##
    imagePullSecrets: [ ]

    ## Pod-level security settings
    ##
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

    ## Container-level security settings
    ##
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true

    ## Resource limits and requests
    ##
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi

    ## Manager pod's affinity
    ##
    affinity: { }

    ## Manager pod's node selector
    ##
    nodeSelector: { }

    ## Manager pod's tolerations
    ##
    tolerations: [ ]

  ## Helper RBAC roles for managing custom resources
  ##
  rbacHelpers:
    # Install convenience admin/editor/viewer roles for CRDs
    enable: false

  ## Custom Resource Definitions
  ##
  crd:
    # Install CRDs with the chart
    enable: true
    # Keep CRDs when uninstalling
    keep: true

  ## Controller metrics endpoint.
  ## Enable to expose /metrics endpoint with RBAC protection.
  ##
  metrics:
    enable: true
    # Metrics server port
    port: 8443

  ## Cert-manager integration for TLS certificates.
  ## Required for webhook certificates and metrics endpoint certificates.
  ##
  certManager:
    enable: true

  ## Webhook server configuration
  ##
  webhook:
    enable: true
    # Webhook server port
    port: 9443

  ## Prometheus ServiceMonitor for metrics scraping.
  ## Requires prometheus-operator to be installed in the cluster.
  ##
  prometheus:
    enable: false

