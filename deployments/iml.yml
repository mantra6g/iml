---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iml-lnfvo-sa
  namespace: default



---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: iml-lnfvo-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: iml-lnfvo-sa
    namespace: default



---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iml-lnfvo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iml-lnfvo
  template:
    metadata:
      labels:
        app: iml-lnfvo
    spec:
      serviceAccountName: iml-lnfvo-sa
      containers:
        - name: iml-lnfvo
          image: tomasagata/iml-lnfvo
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: KUBECONFIG
              value: /root/.kube/config  # This is optional, depending on how helm is used inside


---
apiVersion: v1
kind: Service
metadata:
  name: iml-lnfvo
spec:
  selector:
    app: iml-lnfvo
  type: NodePort
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
