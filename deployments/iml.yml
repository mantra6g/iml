apiVersion: v1
kind: Namespace
metadata:
  name: desire6g-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iml-nfvo-sa
  namespace: desire6g-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: iml-nfvo-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: iml-nfvo-sa
    namespace: desire6g-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iml-nfvo
  namespace: desire6g-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iml-nfvo
  template:
    metadata:
      labels:
        app: iml-nfvo
    spec:
      nodeName: oai-01
      serviceAccountName: iml-nfvo-sa
      containers:
        - name: iml-nfvo
          image: tomasagata/iml-nfvo
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: KUBECONFIG
              value: /root/.kube/config

---
apiVersion: v1
kind: Service
metadata:
  name: iml-nfvo
  namespace: desire6g-system
spec:
  selector:
    app: iml-nfvo
  type: NodePort
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30050

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: iml-daemon
  namespace: desire6g-system
spec:
  selector:
    matchLabels:
      app: iml-daemon
  template:
    metadata:
      labels:
        app: iml-daemon
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: "Exists"  # Allow running on master and tainted nodes
      containers:
        - name: iml-daemon
          image: tomasagata/iml-daemon:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7623
              hostPort: 7623
      initContainers:
        - name: installer
          image: tomasagata/imlcni:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
          command:
            - /bin/sh
            - -c
            - |
              echo "Installing CNI plugin..."
              cp /app/imlcni /host/opt/cni/bin/
              chmod +x /host/opt/cni/bin/imlcni
              echo "Done"
      volumes:
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: iml-cni
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "type": "imlcni"
    }