apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: loom-daemon
  name: loom-daemon-sa
  namespace: loom-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: loom-daemon-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - nodes/status
  verbs:
  - get
- apiGroups:
  - core.loom.io
  resources:
  - applications
  - networkfunctions
  - p4targets
  - servicechains
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.loom.io
  resources:
  - applications/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - core.loom.io
  resources:
  - networkfunctions/status
  - p4targets/status
  - servicechains/status
  verbs:
  - get
- apiGroups:
  - infra.loom.io
  resources:
  - loomnodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infra.loom.io
  resources:
  - loomnodes/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: loom-daemon
  name: loom-daemon-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: loom-daemon-role
subjects:
- kind: ServiceAccount
  name: loom-daemon-sa
  namespace: loom-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: loom-daemon
  name: loom-daemon
  namespace: loom-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: loom-daemon
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: daemon
      labels:
        app.kubernetes.io/name: loom-daemon
    spec:
      containers:
      - command:
        - /daemon
        image: daemon:local
        name: daemon
        resources:
          limits:
            cpu: 1000m
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 512Mi
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /etc/iml/config
          name: iml-config
          readOnly: true
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      initContainers:
      - command:
        - /bin/sh
        - -c
        - |
          cp /loom /host/opt/cni/bin/
          chmod +x /host/opt/cni/bin/loom
        image: cni:local
        name: cni-installer
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /host/opt/cni/bin
          name: cni-bin
      serviceAccountName: loom-daemon-sa
      volumes:
      - hostPath:
          path: /opt/cni/bin
        name: cni-bin
      - configMap:
          name: loom-iml-config
        name: iml-config
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: loom-cni
  namespace: loom-system
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "type": "loom",
      "cni-args": {
        "app_type": "application"
      }
    }
