apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "daemon.resourceName" (dict "context" . "suffix" "binding") }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "daemon.resourceName" (dict "context" . "suffix" "role") }}
subjects:
  - kind: ServiceAccount
    name: {{ include "daemon.resourceName" (dict "context" . "suffix" "sa") }}
    namespace: {{ include "daemon.namespaceName" . }}
