apiVersion: v1
kind: Pod
metadata:
  name: bmv2-test
spec:
  restartPolicy: Always
  containers:
  - name: bmv2-driver
    image: bmv2-driver:local
    imagePullPolicy: Never
  - name: bmv2-switch
    image: p4lang/behavioral-model:latest
    imagePullPolicy: IfNotPresent
    command: ["simple_switch_grpc"]
    args:
      - "--no-p4"
      - "--log-console"
      - "--"
      - "--grpc-server-addr=0.0.0.0:9559"
      - "--cpu-port=255"
