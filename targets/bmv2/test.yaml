apiVersion: v1
kind: Pod
metadata:
  name: bmv2-test
spec:
  restartPolicy: Always
  containers:
  - name: bmv2-driver
    image: driver:local
    imagePullPolicy: Never
  - name: bmv2-switch
    image: p4lang/behavioral-model:latest
    imagePullPolicy: IfNotPresent
    command: ["simple_switch_grpc"]
    args:
      - "--device-id"
      - "1"
      - "--grpc-server-addr"
      - "127.0.0.1:9559"
      - "--log-console"
