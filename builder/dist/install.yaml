            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ServiceChain
            properties:
              from:
                description: Specifies the source application
                properties:
                  name:
                    description: Name of the resource.
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  namespace:
