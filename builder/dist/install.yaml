            required:
            - from
            - to
            type: object
          status:
            description: status defines the observed state of ServiceChain
            properties:
              dst_app_uid:
                description: UID of the destinatination application.
                type: string
              nfs_uids:
                description: UID of the intermediate functions.
                items:
                  description: |-
                    UID is a type that holds unique ID values, including UUIDs.  Because we
