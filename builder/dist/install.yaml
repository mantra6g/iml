                items:
                  properties:
                    name:
                      description: Name of the resource.
                      maxLength: 253
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    namespace:
                      default: default
                      description: |-
                        Namespace of the resource.
                        Optional. Defaults to "default" if not set.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                  required:
                  - name
                  type: object
                type: array
              to:
                description: Specifies the destination application
                properties:
                  name:
                    description: Name of the resource.
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  namespace:
                    default: default
                    description: |-
