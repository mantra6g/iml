    app.kubernetes.io/name: builder
    control-plane: controller-manager
  name: iml-updates-service
  namespace: desire6g-system
spec:
  ports:
  - name: http
    port: 1810
    protocol: TCP
    targetPort: 3267
  - name: mqtt
    port: 1816
    protocol: TCP
