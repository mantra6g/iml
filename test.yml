lnsd:
  ## lnsd refers to a network service graph whose subgraph is described
  ns-instance-id: "11223344-e2a8-4338-bc8c-be685548bad2"
  ns:
    name: "Ping demo"
    id: "deadbeef" # refers to the ns in the service catalog
    vendor: "D6G"
    descriptor-version: "1.0"
    site-id: "d6g-001"

    network-functions: []

    application-functions:
      - af-instance-id: "app_A"
        af-id: "curl"
        af-version: "1.0"
      - af-instance-id: "app_B"
        af-id: "nginx"
        af-version: "1.0"

    forwarding_graphs:
    - name: "A-to-B"
      source: "app_A:1"
      target: "app_B:1"
